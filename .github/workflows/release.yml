name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Instalar dependências
        run: pip install pyyaml jsonschema pytest

      - name: Golden valuation-engine
        run: python skills/er-valuation/tests/test_golden_vrsk.py

      - name: cap_check selftest
        run: python skills/er-valuation/cap_check.py --selftest

      - name: pytest
        run: if [ -d tests ]; then python -m pytest tests -q; else echo "tests/ ainda não existe"; fi

      - name: Estrutura do plugin
        run: |
          python -c "import json; d=json.load(open('.claude-plugin/plugin.json', encoding='utf-8')); assert all(k in d and d[k] for k in ('name','version','description')), 'campos obrigatorios faltando'; print('plugin.json OK:', d['name'], d['version'])"

      - name: Validar tag == version do plugin.json
        run: python -c "import json,os; v=json.load(open('.claude-plugin/plugin.json'))['version']; t=os.environ['GITHUB_REF_NAME']; assert t=='v'+v, f'tag {t} != v{v}'"

      - name: Empacotar ZIP
        run: zip -r "equity-research-fleet-${GITHUB_REF_NAME}.zip" . -x '.git/*' -x '.github/*' -x '.superpowers/*' -x '**/__pycache__/*' -x 'docs/fontes/*' -x 'tests/*'

      - name: Publicar release
        uses: softprops/action-gh-release@v2
        with:
          files: equity-research-fleet-${{ github.ref_name }}.zip

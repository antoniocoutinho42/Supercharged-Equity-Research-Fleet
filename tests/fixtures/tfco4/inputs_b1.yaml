    - {nome: "VULC3 (Vulcabras)", pe: 5.00, fonte: "[RECONSTRUÍDO p/ mediana 5,24]"}
    - {nome: "AZZA3 (Azzas 2154)", pe: 5.48, fonte: "[RECONSTRUÍDO p/ mediana 5,24]"}

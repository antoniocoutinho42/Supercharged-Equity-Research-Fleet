      - {nome: "Inditex", anos: 25}

premissas:
  ke_hurdle: 0.13                        # p.9 "hurdle.ke = 0,13 (retorno exigido pelo usuário)"
  ke_economico: [0.13, 0.14, 0.15]       # p.9 "grade de Ke CAPM 13/14/15%", central 14%
  cap_teto_defensavel: 15                # p.9 "cap.teto_defensavel = 15"
  cap_confianca: MEDIA                   # p.9 "cap.confianca = MEDIA"
  justificativa_cap: >                   # p.9 §3 (cap.justificativa_cap, resumo fiel)
    Sobrescrita PARA BAIXO da banda cap_check moat-claro (12-18): persistência de spread
    verificável e consolidada de apenas 5 anos (série pública desde o IPO 2020; operação
    privada desde 1988 não verificável em filings), moat de marca/comunidade (não switching
    contratual) e quatro vetores de erosão ABERTOS (concorrência athleisure, ciclo de consumo
    BR, execução Europa, IA). Base = 12 (piso da banda), bull = 15 (dentro da banda), bear = 7
    (fade rápido se SSS desacelera/satura). Confiança MEDIA com spread bear-bull alargado.
  justificativa_cenarios: >              # p.5 "Fundamentação do CAP por cenário"
    Bear (CAP 7): SSS desacelera sobre base difícil, saturação de rede e ciclo de consumo BR
    encurtam a duração do spread. Base (CAP 12): moat renovado no ritmo histórico, runway de
    lojas (BR subpenetrado) e digital. Bull (CAP 15): execução de marca + Europa + On ampliam
    o runway até a banda do moat claro.
  justificativa_g: >                     # p.5 "Fundamentação do crescimento (g) por cenário"
    Bear (g 6%): mix franquia (margem menor) e ciclo comprimem o crescimento de lucro bem
    abaixo do CAGR histórico. Base (g 12%): crescimento orgânico de lucro maturando dos
    ~20-25% recentes com diluição gradual de margem por mix. Bull (g 17%): reaceleração de
    SSS, novo formato (~2x), On e Europa. Teto de coerência g < ROE respeitado.
  justificativa_roe: >                   # p.5 "Fundamentação do ROE por cenário"
    Bear (ROE 18%): compressão de margem pelo mix e desalavancagem operacional, ainda acima
    do custo de capital. Base (ROE 22%): ROE meio de ciclo abaixo do pico corrente (~25%)
    por mix e normalização dos add-backs. Bull (ROE 25%): manutenção do giro asset-light e
    do pricing power (margem bruta ~60%). ROE de pico NÃO extrapolado.
  cenarios:                              # p.5 tabela "Cenários"
    bear: {prob: 0.30, g: 0.06, roe: 0.18, cap: 7}
    base: {prob: 0.50, g: 0.12, roe: 0.22, cap: 12}
    bull: {prob: 0.20, g: 0.17, roe: 0.25, cap: 15}
  multiplos_validacao:
    metrica_primaria: PE                 # p.10 "validacao_multiplos (base PE, ADJUSTED)"
    base_lucro: ADJUSTED                 # p.6/p.10
    limiar_divergencia: 0.30             # [RECONSTRUÍDO] limiar nao publicado; divergencias -56,1% e +67,6% = DIVERGE_MATERIAL
  resolucao_divergencia:
    via: EXPLICACAO_FUNDAMENTADA         # p.9 "Via: EXPLICACAO_FUNDAMENTADA"
    texto: >                             # p.6/p.9 (íntegra resumida da resolução publicada)
      Duas pernas em direções opostas, resolvidas separadamente. (1) vs. PARES (+67,6%; justo
      8,78x acima da mediana 5,24x): não é divergência a corrigir — pares BR (SBFG3 ROE 13%,
      VULC3, AZZA3 ROE 10%, LREN3) são varejo cíclico de qualidade inferior a 4-6x; o justo já
      concede ~68% de prêmio endógeno via ROE/g/CAP superiores; piso confirma que o modelo não
      é pessimista demais. (2) vs. HISTÓRIA PRÓPRIA (−56,1%; justo 8,78x abaixo da mediana
      20x): tensão real, não reconciliada inflando premissas — a diferença é inteiramente
      g × duração; o preço/história embute CAP implícito 42,9a, g implícito 26,2% e Ke ~8,8%,
      indefensáveis ex-ante (persistência verificável 5a, moat não contratual, vetores
      abertos, compressão de margem por mix em curso). Observável que arbitra: SSS + aberturas
      líquidas + economia unitária do novo formato, 4-8 trimestres.
  ms_minima: 0.12                        # p.10 "ms_minima = 0,12 sob o hurdle ponderado R$9,01"
  limitrofe_teto: 1.10                   # [RECONSTRUÍDO] valor nao publicado no PDF; default do exemplo VRSK
  ladder_precos: [12, 10, 9, 8]          # p.7/p.10 tabela do ladder (12,00 / 10,00 / 9,00 / 8,00)

gate:                                    # p.9 §4
  limiar_cap_implicito_vs_teto: 2.0      # p.9 "gate.razoes: cap_implicito/teto = 2,86 >= 2,0"
  limiar_preco_vs_bull_econ: 1.4         # [RECONSTRUÍDO] razao 1,17 "nao gatilhou" (p.9); limiar nao publicado — default 1,4 do exemplo

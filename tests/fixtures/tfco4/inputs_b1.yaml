    consolidada:
      persistencia_spread_anos: 5        # p.4/p.7/p.9 "persistência verificável e consolidada = 5 anos (série pública desde o IPO 2020)"
      fonte: "ROE 25-29% vs custo de capital ref. ~13-14%, 2021-2025; 2020 ~12,8% COVID (p.4)"
    fontes_estruturais:                  # p.9 §3 (cap_check: banda moat claro 12-18 a partir destas fontes)
      - {nome: "marca com margem bruta ~60%", evidencia: "pricing power sustentado (p.4 Pilar 6)"}
      - {nome: "rede de franquias asset-light", evidencia: "435 lojas, ~40 aberturas/ano a capital de franqueado (p.4)"}

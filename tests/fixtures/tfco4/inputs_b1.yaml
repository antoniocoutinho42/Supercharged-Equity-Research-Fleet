      - {nome: "moda + ciclo de consumo BR", status: "ABERTO", materialidade: "média", probabilidade: "média", horizonte_anos: 4}
      - {nome: "execucao Europa", status: "ABERTO", materialidade: "baixa", probabilidade: "média", horizonte_anos: 5}
      - {nome: "IA (substituicao/compressao)", status: "ABERTO", materialidade: "baixa", probabilidade: "baixa", horizonte_anos: 5}
    precedentes:                         # p.4 "Taxa-base honesta"

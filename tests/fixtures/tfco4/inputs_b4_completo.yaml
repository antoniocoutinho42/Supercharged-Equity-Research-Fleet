premissas:
  ke_hurdle: 0.13
  ke_economico:
  - 0.13
  - 0.14
  - 0.15
  cap_teto_defensavel: 15
  cap_confianca: MEDIA
  justificativa_cap: 'Sobrescrita PARA BAIXO da banda cap_check moat-claro (12-18): persistência de spread
    verificável e consolidada de apenas 5 anos (série pública desde o IPO 2020; operação privada desde
    1988 não verificável em filings), moat de marca/comunidade (não switching contratual) e quatro vetores
    de erosão ABERTOS (concorrência athleisure, ciclo de consumo BR, execução Europa, IA). Base = 12 (piso
    da banda), bull = 15 (dentro da banda), bear = 7 (fade rápido se SSS desacelera/satura). Confiança
    MEDIA com spread bear-bull alargado.

    '
  justificativa_cenarios: 'Bear (CAP 7): SSS desacelera sobre base difícil, saturação de rede e ciclo
    de consumo BR encurtam a duração do spread. Base (CAP 12): moat renovado no ritmo histórico, runway
    de lojas (BR subpenetrado) e digital. Bull (CAP 15): execução de marca + Europa + On ampliam o runway
    até a banda do moat claro.

    '
  justificativa_g: 'Bear (g 6%): mix franquia (margem menor) e ciclo comprimem o crescimento de lucro
    bem abaixo do CAGR histórico. Base (g 12%): crescimento orgânico de lucro maturando dos ~20-25% recentes
    com diluição gradual de margem por mix. Bull (g 17%): reaceleração de SSS, novo formato (~2x), On
    e Europa. Teto de coerência g < ROE respeitado.

    '
  justificativa_roe: 'Bear (ROE 18%): compressão de margem pelo mix e desalavancagem operacional, ainda
    acima do custo de capital. Base (ROE 22%): ROE meio de ciclo abaixo do pico corrente (~25%) por mix
    e normalização dos add-backs. Bull (ROE 25%): manutenção do giro asset-light e do pricing power (margem
    bruta ~60%). ROE de pico NÃO extrapolado.

    '
  cenarios:
    bear:
      prob: 0.3
      g: 0.06
      roe: 0.18
      cap: 7
    base:
      prob: 0.5
      g: 0.12
      roe: 0.22
      cap: 12
    bull:

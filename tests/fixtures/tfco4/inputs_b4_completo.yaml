  resolucao_divergencia:
    via: EXPLICACAO_FUNDAMENTADA
    texto: 'Duas pernas em direções opostas, resolvidas separadamente. (1) vs. PARES (+67,6%; justo 8,78x
      acima da mediana 5,24x): não é divergência a corrigir — pares BR (SBFG3 ROE 13%, VULC3, AZZA3 ROE
      10%, LREN3) são varejo cíclico de qualidade inferior a 4-6x; o justo já concede ~68% de prêmio endógeno
      via ROE/g/CAP superiores; piso confirma que o modelo não é pessimista demais. (2) vs. HISTÓRIA PRÓPRIA
      (−56,1%; justo 8,78x abaixo da mediana 20x): tensão real, não reconciliada inflando premissas —
      a diferença é inteiramente g × duração; o preço/história embute CAP implícito 42,9a, g implícito
      26,2% e Ke ~8,8%, indefensáveis ex-ante (persistência verificável 5a, moat não contratual, vetores
      abertos, compressão de margem por mix em curso). Observável que arbitra: SSS + aberturas líquidas
      + economia unitária do novo formato, 4-8 trimestres.

      '

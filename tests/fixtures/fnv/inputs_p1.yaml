premissas:                    # dono: MODELADOR (G3). Defesa registrada no valuation.md.
  ke_hurdle: 0.12              # padrao (small/mid cap gold royalty listada em NYSE/TSX, sem qualidade premium comprovada suficiente para 9%; risco politico/ciclico ativo compensa balanco debt-free)
  ke_economico: [0.081, 0.086, 0.091]   # CAPM: rf 4,60% (UST10y, 15/07/2026) + beta [0,70/0,80/0,90] (consenso 0,83 Investing.com, 0,90 Yahoo/Google 0,90, 0,36-0,90 dispersao ampla entre fontes; usamos banda 0,70-0,90 centrada em 0,80) x ERP 5,0%. Sanity check: rf+2,5pp=7,10% a rf+6pp=10,60% -> banda 8,1-9,1% esta dentro.
  cap_teto_defensavel: 20      # teto defensavel = CAP do cenario bull (P1, pre-revisao de CAP)
  cap_confianca: MEDIA
  justificativa_cap: >
    REVISADO NESTA RODADA (P2, delta): duracao economica provavel dos retornos excedentes da FNV
    CONSOLIDADA elevada de 15 para 17 anos no cenario base (banda "moat claro", 12-18, proximo do
    teto). Motivo da revisao: releitura mais completa do DOSSIE DE DURACAO DO MOAT (dossie.md)
    identificou evidencia de renovacao organica de reserva/vida-de-mina em MULTIPLOS ativos
    nomeados, nao apenas Candelaria: Detour Lake (plano de expansao subterranea), Magino
    (expansao de moinho para 20.000 tpd e aumento de 30% em reservas minerais) e East Gouldie
    (FNV cobre ~24% da reserva, com perfuracao continuando a estender o deposito, opcionalidade
    de exploracao sem capital adicional da FNV). Essa e uma forma de renovacao do moat MAIS FORTE
    que a evidencia usada na rodada anterior (deployment de capital em M&A), porque ocorre a
    custo marginal zero para a FNV e e estrutural ao proprio modelo de royalty (vida util de
    mina tipicamente 10-25+ anos, renovavel via exploracao do operador). Fontes estruturais
    previas mantidas: royalty e servidao real sobre a propriedade mineral (Goldstrike 1986, ~40
    anos ainda pagando), escala e diversificacao (121 ativos produtores), acesso preferencial a
    deal flow (4 aquisicoes pos-2025, deployment recorde US$2.190mi em 2025). Precedentes
    setoriais N=3 convergem em 19-30 anos (FNV desde IPO 2007 = 19a; Royal Gold >30a; Wheaton
    ~20a). MESMO COM A REVISAO, NAO elevamos para banda geracional (25+) e MANTEMOS confianca
    MEDIA (nao ALTA), pelas MESMAS tres razoes da rodada anterior, ainda validas e nao afetadas
    pela nova evidencia de reserva: (1) persistencia de spread ROIC positivo CALCULADA cobre
    apenas 5 anos (2021-2025), limitacao de dados declarada pelo Analista; (2) dois vetores de
    erosao ABERTOS com materialidade ALTA seguem SEM resolucao (risco politico Cobre Panama,
    ciclicidade estrutural do preco do ouro) -- a evidencia de reserva/mina nao muda nada sobre
    esses dois vetores, que sao politicos/macro, nao geologicos; (3) o segmento Diversified
    (14,3% do peso, persistencia 10 anos) segue reduzindo a persistencia ponderada consolidada.
    IMPORTANTE (transparencia ao Coordenador/Auditor): esta revisao de CAP e resultado de
    releitura mais cuidadosa de evidencia JA DISPONIVEL no dossie.md original (nao e dado novo
    coletado nesta rodada) e e justificada nos MERITOS PROPRIOS do julgamento de CAP -- nao foi
    motivada pela divergencia de multiplos. A quantificacao abaixo (elasticidades/reverse)
    mostra que mesmo esta CAP revisada NAO resolve a divergencia de multiplos (efeito marginal
    de poucos dolares por acao); a extensao de CAP nao e, sozinha, a solucao ao ponto em aberto.
  justificativa_cenarios: >
    Bear (CAP 10, banda default, inalterado): Cobre Panama nao retoma operacao plena e ciclo do
    ouro vira para baixo simultaneamente, truncando a janela de reinvestimento e acelerando a
    maturidade natural do portfolio sem reposicao equivalente de deal flow ou de reserva.
    Base (CAP 17, "moat claro" upper bound, revisado de 15): renovacao do moat prossegue tanto
    via deal flow (ritmo 2025) quanto via extensao organica de reserva/vida-de-mina em ativos
    Tier-1 ja detidos (Candelaria, Detour Lake, Magino, East Gouldie), Cobre Panama normaliza
    parcialmente, ciclo do ouro nem excepcional nem adverso.
    Bull (CAP 23, "excepcional", revisado de 20): resolucao favoravel de Cobre Panama (restart
    pleno) combinada a manutencao do ritmo de aquisicoes Tier-1 E continuidade do padrao de
    extensao de reserva observado em multiplos ativos-ancora, aproximando a persistencia dos
    precedentes setoriais de 19-30 anos.
  justificativa_g: >
    Bear (g 4%): reprecificacao do ouro em baixa reduz volume de GEOs vendidos e desacelera
    deployment de novo capital (menos alvos de aquisicao economicamente atrativos), retencao
    de ~73% aplicada a ROE de 9% mantem g bem abaixo do teto de coerencia (g/ROE=0,44).
    Base (g 7%): crescimento organico ancorado no ritmo de deployment 2024-2025 (US$406mi para
    US$2.190mi) normalizado para um ritmo sustentavel de meio de ciclo, mais reajuste
    contratual de royalties/streams existentes; g/ROE=0,58, abaixo da retencao historica de
    ~73% (payout 2025 ~27,2% do lucro ajustado).
    Bull (g 9%): ritmo de aquisicoes Tier-1 mantido no patamar recorde de 2025 e ciclo de
    precos de metais preciosos favorece expansao de GEOs vendidos acima da media historica;
    g/ROE=0,60, ainda dentro da retencao observada.
  justificativa_roe: >
    Bear (ROE 9%): compressao de margem por preco de ouro mais fraco, proximo ao ponto mais
    baixo observado na serie 2021-2025+TTM (ROE GAAP minimo ex-2023 distorcido = 9,21% em
    2024); tambem absorve impacto parcial do vetor AGRAVANDO de transfer pricing canadense.
    Base (ROE 12%): meio de ciclo entre os pontos observados 2021-2025 (10,9%-14,6%,
    excluindo 2023 GAAP distorcido por impairment nao-caixa), consistente com ROIC
    reconstruido pelo Analista (10,9%-16,7% no mesmo periodo, spread positivo em todos os 6
    pontos observados).
    Bull (ROE 15%): sustentacao do patamar de 2025/TTM (ROE GAAP 14,57%, ROIC TTM 16,73%),
    refletindo alavancagem operacional do modelo de royalty/streaming (custo quase fixo) sob
    precos de metais preciosos estruturalmente altos.
  cenarios:
    bear: {prob: 0.25, g: 0.04, roe: 0.09, cap: 10}
    base: {prob: 0.50, g: 0.07, roe: 0.12, cap: 15}
